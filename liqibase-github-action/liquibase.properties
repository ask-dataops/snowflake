# =============================================================================
# liquibase.properties — Snowflake connection defaults
# =============================================================================
# Sensitive values (username/password) are injected at runtime via env vars.
# All other values are overridden by the GitHub Actions workflow from config.yaml
# =============================================================================

driver=net.snowflake.client.jdbc.SnowflakeDriver
changeLogFile=config/db.changelog-master.xml

# Connection — overridden at runtime by workflow
url=jdbc:snowflake://${SNOWFLAKE_ACCOUNT}.snowflakecomputing.com/?db=${SNOWFLAKE_DB}&schema=${SNOWFLAKE_SCHEMA}&warehouse=${SNOWFLAKE_WAREHOUSE}&role=${SNOWFLAKE_ROLE}
username=${SNOWFLAKE_USER}
password=${SNOWFLAKE_PASSWORD}

# Liquibase tracking tables (stored in Snowflake)
liquibaseSchemaName=PUBLIC
databaseChangeLogTableName=DATABASECHANGELOG
databaseChangeLogLockTableName=DATABASECHANGELOGLOCK

# Logging
logLevel=INFO
logFile=liquibase.log
