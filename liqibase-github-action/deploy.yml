name: Liquibase Snowflake Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - performance
          - preprod
          - prod

concurrency:
  group: liquibase-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:

  load-config:
    name: Load config for ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      snowflake_account:   ${{ steps.parse.outputs.snowflake_account }}
      snowflake_db:        ${{ steps.parse.outputs.snowflake_db }}
      snowflake_schema:    ${{ steps.parse.outputs.snowflake_schema }}
      snowflake_warehouse: ${{ steps.parse.outputs.snowflake_warehouse }}
      snowflake_role:      ${{ steps.parse.outputs.snowflake_role }}
      liquibase_contexts:  ${{ steps.parse.outputs.liquibase_contexts }}

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Parse config.yaml
        id: parse
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if ! yq ".environments | has(\"${ENV}\")" config/config.yaml | grep -q "true"; then
            echo "❌ Environment '${ENV}' not found in config/config.yaml"
            exit 1
          fi
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done < <(yq ".environments.${ENV} | to_entries | .[] | .key + \"=\" + .value" config/config.yaml)
          echo "✅ Config loaded for: ${ENV}"

  migrate:
    name: Migrate ${{ github.event.inputs.environment }}
    needs: load-config
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Liquibase 5.1
        run: |
          curl -sL https://github.com/liquibase/liquibase/releases/download/v5.1.0/liquibase-5.1.0.tar.gz \
            | tar -xz -C /opt/liquibase
          echo "/opt/liquibase" >> $GITHUB_PATH

      - name: Download Snowflake JDBC Driver
        run: |
          mkdir -p liquibase/lib
          curl -sL https://repo1.maven.org/maven2/net/snowflake/snowflake-jdbc/3.15.0/snowflake-jdbc-3.15.0.jar \
            -o liquibase/lib/snowflake-jdbc.jar

      - name: Convert P8 key to base64 DER for JDBC
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          # Only needed if your P8 key has a passphrase:
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          # Write PEM to temp file
          echo "${SNOWFLAKE_PRIVATE_KEY}" > /tmp/snowflake_key.p8

          # Convert PEM → DER → base64 (what Snowflake JDBC expects)
          if [ -n "${SNOWFLAKE_PRIVATE_KEY_PASSPHRASE}" ]; then
            # Encrypted key — decrypt first
            openssl pkcs8 -in /tmp/snowflake_key.p8 \
              -passin env:SNOWFLAKE_PRIVATE_KEY_PASSPHRASE \
              -nocrypt -out /tmp/snowflake_key_plain.p8
            openssl pkcs8 -in /tmp/snowflake_key_plain.p8 \
              -nocrypt -topk8 -outform DER \
              | base64 -w 0 > /tmp/snowflake_key.b64
            rm -f /tmp/snowflake_key_plain.p8
          else
            # Unencrypted key
            openssl pkcs8 -in /tmp/snowflake_key.p8 \
              -nocrypt -topk8 -outform DER \
              | base64 -w 0 > /tmp/snowflake_key.b64
          fi

          # Export to env for next steps — never printed to logs
          echo "SNOWFLAKE_PRIVATE_KEY_BASE64=$(cat /tmp/snowflake_key.b64)" >> $GITHUB_ENV

          # Clean up temp files
          rm -f /tmp/snowflake_key.p8 /tmp/snowflake_key.b64
          echo "✅ Key converted"

      - name: Validate changelog
        run: |
          liquibase \
            --driver=net.snowflake.client.jdbc.SnowflakeDriver \
            --classpath=liquibase/lib/snowflake-jdbc.jar \
            --url="jdbc:snowflake://${{ needs.load-config.outputs.snowflake_account }}.snowflakecomputing.com/?db=${{ needs.load-config.outputs.snowflake_db }}&schema=${{ needs.load-config.outputs.snowflake_schema }}&warehouse=${{ needs.load-config.outputs.snowflake_warehouse }}&role=${{ needs.load-config.outputs.snowflake_role }}&authenticator=snowflake_jwt&privateKey=${SNOWFLAKE_PRIVATE_KEY_BASE64}" \
            --username="${{ vars.SNOWFLAKE_USER }}" \
            --changeLogFile=config/db.changelog-master.xml \
            --contexts="${{ needs.load-config.outputs.liquibase_contexts }}" \
            validate

      - name: Run Liquibase update
        run: |
          liquibase \
            --driver=net.snowflake.client.jdbc.SnowflakeDriver \
            --classpath=liquibase/lib/snowflake-jdbc.jar \
            --url="jdbc:snowflake://${{ needs.load-config.outputs.snowflake_account }}.snowflakecomputing.com/?db=${{ needs.load-config.outputs.snowflake_db }}&schema=${{ needs.load-config.outputs.snowflake_schema }}&warehouse=${{ needs.load-config.outputs.snowflake_warehouse }}&role=${{ needs.load-config.outputs.snowflake_role }}&authenticator=snowflake_jwt&privateKey=${SNOWFLAKE_PRIVATE_KEY_BASE64}" \
            --username="${{ vars.SNOWFLAKE_USER }}" \
            --changeLogFile=config/db.changelog-master.xml \
            --contexts="${{ needs.load-config.outputs.liquibase_contexts }}" \
            --log-level=INFO \
            update

      - name: Post-migration summary
        if: success()
        env:
          SNOWFLAKE_ACCOUNT:   ${{ needs.load-config.outputs.snowflake_account }}
          SNOWFLAKE_DB:        ${{ needs.load-config.outputs.snowflake_db }}
          SNOWFLAKE_SCHEMA:    ${{ needs.load-config.outputs.snowflake_schema }}
          SNOWFLAKE_WAREHOUSE: ${{ needs.load-config.outputs.snowflake_warehouse }}
          SNOWFLAKE_ROLE:      ${{ needs.load-config.outputs.snowflake_role }}
          SNOWFLAKE_USER:      ${{ vars.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          pip install snowflake-connector-python --quiet
          python3 << 'EOF'
          import snowflake.connector, os
          from cryptography.hazmat.backends import default_backend
          from cryptography.hazmat.primitives.serialization import load_pem_private_key

          # Load P8 key for Python connector
          pem_data = os.environ["SNOWFLAKE_PRIVATE_KEY"].encode()
          passphrase = os.environ.get("SNOWFLAKE_PRIVATE_KEY_PASSPHRASE", "").encode() or None
          private_key = load_pem_private_key(pem_data, password=passphrase, backend=default_backend())

          conn = snowflake.connector.connect(
              account    = os.environ["SNOWFLAKE_ACCOUNT"],
              user       = os.environ["SNOWFLAKE_USER"],
              private_key= private_key,
              database   = os.environ["SNOWFLAKE_DB"],
              schema     = os.environ["SNOWFLAKE_SCHEMA"],
              warehouse  = os.environ["SNOWFLAKE_WAREHOUSE"],
              role       = os.environ["SNOWFLAKE_ROLE"]
          )
          cur = conn.cursor()

          cur.execute("""
              SELECT ID, AUTHOR, FILENAME, DATEEXECUTED, EXECTYPE
              FROM DATABASECHANGELOG
              WHERE DATEEXECUTED >= DATEADD('minute', -10, CURRENT_TIMESTAMP())
              ORDER BY DATEEXECUTED
          """)
          rows = cur.fetchall()
          if rows:
              print("=== Changesets executed this run ===")
              for r in rows:
                  print(f"  [{r[4]}] {r[0]} by {r[1]}  ({r[2]})  at {r[3]}")
          else:
              print("=== No new changesets (already up to date) ===")

          cur.execute("""
              SELECT TABLE_NAME, ROW_COUNT
              FROM INFORMATION_SCHEMA.TABLES
              WHERE TABLE_SCHEMA = CURRENT_SCHEMA()
                AND TABLE_TYPE   = 'BASE TABLE'
                AND TABLE_NAME  NOT IN ('DATABASECHANGELOG','DATABASECHANGELOGLOCK')
              ORDER BY TABLE_NAME
          """)
          print("\n=== Table row counts ===")
          for r in cur.fetchall():
              print(f"  {r[0]}: {r[1]:,} rows")

          cur.close()
          conn.close()
          EOF

      - name: Upload Liquibase logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: liquibase-logs-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: liquibase.log
          retention-days: 30
